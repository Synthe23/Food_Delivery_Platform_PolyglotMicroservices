services:
    postgres:
      image: postgres:16
      container_name: resturant-service-postgres
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: resturant_service_db
      ports:
        - "5434:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: